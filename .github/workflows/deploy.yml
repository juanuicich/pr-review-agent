name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - name: Generate wrangler.jsonc from template
        run: |
          sed \
            -e "s/TODO_CREATE_KV_NAMESPACE/${{ vars.CF_KV_NAMESPACE_ID }}/" \
            -e "s/TODO_CREATE_R2_BUCKET/${{ vars.CF_R2_BUCKET_NAME }}/" \
            wrangler.jsonc.example > wrangler.jsonc

      - name: Deploy
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
