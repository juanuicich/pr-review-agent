name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - run: npm ci

      - name: Generate wrangler.jsonc from template
        run: |
          sed \
            -e "s/TODO_CREATE_KV_NAMESPACE/${{ vars.CF_KV_NAMESPACE_ID }}/" \
            -e "s/TODO_CREATE_R2_BUCKET/${{ vars.CF_R2_BUCKET_NAME }}/" \
            wrangler.jsonc.example > wrangler.jsonc

      - name: Deploy (with retry)
        run: |
          for i in 1 2 3; do
            npx wrangler deploy && break || sleep 30
          done
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
